id: https://w3id.org/peh/peh-model
name: PEH-Model
description: |-
  Entity and relation ontology and datamodel for Personal Exposure and Health data

version: 0.6.1

imports:
  - linkml:types

prefixes:
  pehterms: https://w3id.org/peh/terms/
  peh: https://w3id.org/peh/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  wikidata: https://www.wikidata.org/wiki/
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  skos: http://www.w3.org/2004/02/skos/core#
  prov: http://www.w3.org/ns/prov#
  qudt: https://qudt.org/schema/qudt/
  qudtunit: https://qudt.org/vocab/unit/
  qudtqk: http://qudt.org/2.1/vocab/quantitykind
  iop: https://w3id.org/iadopt/ont/
  owl: http://www.w3.org/2002/07/owl#
  # DATA PREFIXES
  # P: http://example.org/P/
  # ROR: http://example.org/ror/
  # CODE: http://example.org/code/
  # GEO: http://example.org/geoloc/
  #_base: https://w3id.org/peh/terms/

default_prefix: pehterms
default_range: string

classes:
  EntityList:
    tree_root: true
    description: >-
      A generic top level object for collecting named entities under one root entity
    slots:
      - metadata_fields
      - groupings
      - observable_properties
      - stakeholders
      - projects
      - studies
      - study_entities
      - physical_entities
      - observation_groups
      - observations
      - derived_observations
      - observation_designs
      - observation_results
      - observed_values
      - layouts
      - import_configs
      - data_requests
      # subclass templates
      - matrix_subclasses
      - biochementity_subclasses
      - indicator_subclasses
  
  NamedThing:
    abstract: true
    description: >-
      An abstract model for any of the identifiable entities
    slots:
      - id
      - short_name
      - name
      - ui_label
      - description
      - remark
      - exact_matches
    close_mappings:
     - schema:Thing
     - prov:Entity

  Grouping:
    description: >-
      A generic grouping entity that allows categorising entities in a hierarchical structure
    is_a: NamedThing
    mixins:
      - HasContextAliases
      - HasTranslations
    slots:
      - parent_grouping_id_list

  HasValidationStatus:
    description: >-
      The capacity of including both a current validation status and a history of validation records
    mixin: true
    slots:
      - current_validation_status
      - validation_history
  ValidationHistoryRecord:
    description: >-
      A list of events representing a historical record on the entity validation status
    slots:
      - validation_datetime
      - validation_status
      - validation_actor
      - validation_institute
      - validation_remark

  HasAliases:
    description: >-
      The capacity of including one or more alternative naming terms (without qualifying the usage context)
    mixin: true
    slots:
      - aliases
  HasContextAliases:
    description: >-
      The capacity of including a list of terms being used in known scopes or contexts
    mixin: true
    slots:
      - context_aliases
  ContextAlias:
    description: >-
      An alternative term as it is used in a known scope or context (e.g. a community, project or study) for any of the entities and its properties
    slots:
      - property_name
      - context
      - alias
  HasTranslations:
    description: >-
      The capacity of including a list of translated terms for one or more entity properties and languages
    mixin: true
    slots:
      - translations
  Translation:
    description: >-
      A translation for any of the entity properties, defining the property, the language and the translated term
    slots:
      - property_name
      - language
      - translated_value
  
  BioChemEntity:
    class_uri:
      schema:BioChemEntity
    description: >-
      A biological, chemical or biochemical entity that is relevant to the Personal Exposure and Health domain
    is_a: NamedThing
    mixins:
      - HasAliases
      - HasContextAliases
      - HasTranslations
      - HasValidationStatus
  
  BioChemEntitySubClass:
    class_uri: owl:Class
    description: Template class used to generate OWL Classes.
    is_a: NamedThing
    mixins:
      - HasAliases
      - HasContextAliases
      - HasTranslations
      - HasValidationStatus
    slots:
      - grouping_id_list
      - group_labels
      - molweight_grampermol
      - has_role
      - is_metabolite_of
      - is_isomer_of
      - parent_biochementities
      - suggester
  
  Matrix:
    class_uri: wikidata:Q685816
    description: >-
      The physical medium or biological substrate from which a biomarker, or other analyte is quantified in observational studies
    is_a: NamedThing
    mixins:
      - HasContextAliases
      - HasTranslations

  MatrixSubClass:
    class_uri: owl:Class
    is_a: NamedThing
    mixins:
      - HasTranslations
      - HasContextAliases
    description: >
      Template class used to generate OWL Classes.
    slots:
      - parent_matrices
      - suggester

  Indicator:
    class_uri: wikidata:Q937228
    description: >-
      Any measurable or observable variable that can describe data or context in the Personal Exposure and Health domain
    close_mappings:
      - iop:Variable
    is_a: NamedThing

  IndicatorSubClass:
    class_uri: owl:Class
    description: >-
      Template class used to generate OWL Classes
    is_a: NamedThing
    mixins:
      - HasContextAliases
      - HasTranslations
    slots:
      - indicator_type
      - property
      - quantity_kind
      - matrix
      - constraints
      - grouping_id_list
      - relevant_observable_entity_types
      - biochementity
      - parent_indicators
      - suggester

  QUDTUnit:
    class_uri: qudt:Unit
    slots:
      - id
  QUDTQuantityKind:
    class_uri: qudt:QuantityKind
    slots:
      - id

  PhysicalEntity:
    description: >-
      A digital placeholder for a physical entity as it exists in the real world, 
    abstract: true
    is_a: NamedThing
    slots:
      - physical_entity_links
  PhysicalEntityLink:
    description: >-
      A relational property that allows creating qualified links to physical entities
    slots:
      - linktype
      - physical_entity
  Sample:
    description: >-
      A portion of a measurement matrix collected from a subject or environment for the purpose of lab analysis
    is_a: PhysicalEntity
    slots:
      - matrix
      - constraints
      - sampled_in_project
      - physical_label
      - collection_date
  Person:
    description: >-
      A human subject or stakeholder in Personal Exposure and Health research
    is_a: PhysicalEntity
    slots:
      - recruited_in_project
  Geolocation:
    description: >-
      A geographic location relevant to the Personal Exposure and Health projects or studies
    is_a: PhysicalEntity
    slots:
      - location
  Environment:
    description: >-
      An environment relevant to the research, typically related to the exposure of a person
    is_a: PhysicalEntity
  HomeEnvironment:
    description: >-
      A home environment relevant to the research, typically related to the at-home exposure of a person
    is_a: Environment
  WorkEnvironment:
    description: >-
      A work environment relevant to the research, typically related to the at-work or commute exposure of a person
    is_a: Environment

  ObservableProperty:
    description: >-
      A fully defined variable that allows registering an observation about any of the entities relevant to Personal Exposure and Health research
    is_a: NamedThing
    mixins:
      - HasTranslations
      - HasContextAliases
    slots:
      - value_type
      - categorical
      - multivalued
      - value_options
      - value_metadata
      - quantity_kind
      - unit
      - required
      - zeroallowed
      - min_value
      - max_value
      - significantdecimals
      - immutable
      - grouping_id_list
      - observation_result_type
      - relevant_observable_entity_types
      - relevant_observation_types
      - calculation_design
      - validation_designs
      - has_iadopt_variable
      - has_observable_property_type
  
  ObservablePropertyValueOption:
    description: >-
      Potential selection choices for Observable Properties that are categorical variables
    mixins:
      - HasContextAliases
    slots:
      - key
      - value
      - label
  ObservablePropertyMetadataElement:
    description: >-
      Key-value element that adds contextual metadata to an Observable Property instance
    slots:
      - field
      - value
  ObservablePropertyMetadataField:
    description: >-
      Predefined contextual qualifier for Observable Property metadata
    is_a: NamedThing
    slots:
      - value_type
  CalculationDesign:
    description: >-
      Definition of a calculation method for deriving an observational value from other variables and/or contexts
    slots:
      - calculation_name
      - calculation_implementation_as_json
      - calculation_implementation
      - conditional
  CalculationImplementation:
    description: >-
      Reference and parameters mapping to the implementation that can perform the intended calculation
    slots:
      - function_name
      - function_kwargs
      - function_results
  CalculationKeywordArgument:
    description: >-
      The definition of a named argument used in the calculation, including the information needed to pick it from the project or study data structure
    slots:
      - mapping_name
      - process_state
      - imputation_state
      - value_type
      - unit
      - observable_property
      - value
      - contextual_field_reference
    exactly_one_of:
      - slot_conditions:
          value:
            required: true
      - slot_conditions:
          contextual_field_reference:
            required: true

  CalculationResult:
    description: >-
      The definition for the output the calculation, optionally including mapping information
    slots:
      - mapping_name
      - value_type
      - unit
      - round_decimals
      - scale_factor
      - observable_property
      - contextual_field_reference
  ValidationDesign:
    description: >-
      Definition of a validation rule for automatically imposing business logic constraints
    slots:
      - validation_name
      - validation_expression
      - validation_error_level
      - validation_error_message_template
      - conditional
  ValidationExpression:
    description: >-
      A logical expression, allowing for combining arguments into more complex validation rules
    slots:
      - validation_subject_contextual_field_references
      - validation_condition_expression
      - validation_command
      - validation_arg_values
      - validation_arg_contextual_field_references
      - validation_arg_expressions
  ContextualFieldReference:
    description: >-
      A two-level reference, identifying a field or column in a named series of two-dimensional datasets
    slots:
      - dataset_label
      - field_label
  Contact:
    description: >-
      A stakeholder having a contact role in the research process
    mixins:
      - HasContextAliases
    slots:
      - name
      - orcid
      - contact_roles
      - contact_email
      - contact_phone
  Stakeholder:
    description: >-
      Any organisation involved in the research process
    is_a: NamedThing
    mixins:
      - HasTranslations
    slots:
      - rorid
      - geographic_scope
  Project:
    description: >-
      A collaborative effort in the Personal Exposure and Health research domain
    is_a: StudyEntity
    mixins:
      - HasTranslations
      - HasContextAliases
    slots:
      - default_language
      - project_stakeholders
      - start_date
      - end_date
      - study_id_list
  ProjectStakeholder:
    description: >-
      An organisation collaborating in a Personal Exposure and Health research project
    slots:
      - stakeholder
      - project_roles
      - contacts
    mixins:
      - HasTranslations
  StudyEntity:
    description: >-
      Any entity carrying data or context relevant to a Personal Exposure and Health research project or study
    abstract: true
    is_a: NamedThing
    slots:
      - physical_entity
      - study_entity_links
  StudyEntityLink:
    description: >-
      A relational property that allows creating qualified links to study entities
    slots:
      - linktype
      - study_entity
  Study:
    description: >-
      A structured, goal-directed observational investigation designed to collect and analyze data on human subjects and their environments
    is_a: StudyEntity
    mixins:
      - HasTranslations
      - HasContextAliases
    slots:
      - default_language
      - study_stakeholders
      - start_date
      - end_date
      - observation_group_id_list
      - study_entity_id_list
      - project_id_list
  StudyStakeholder:
    description: >-
      An organisation collaborating in a Personal Exposure and Health research study
    slots:
      - stakeholder
      - study_roles
      - contacts
  ObservationGroup:
    description: >-
      A grouped collection of observations, intended and/or executed, as part of a Personal Exposure and Health research study
    is_a: StudyEntity
    slots:
      - start_date
      - end_date
      - observation_id_list
  StudyPopulation:
    description: >-
      A group of study entities that is itself also a study entity that observations can be recorded for
    is_a: StudyEntity
    slots:
      - research_population_type
      - member_id_list
  SampleCollection:
    description: >-
      A collection of samples that is itself also a study entity that observations can be recorded for
    is_a: StudyEntity
    slots:
      - matrix
      - constraints
      - sample_id_list
  StudySubject:
    description: >-
      A study entity that is a main subject for the study
    is_a: StudyEntity
  StudySubjectGroup:
    description: >-
      A group of study subjects that is itself also a study entity that observations can be recorded for
    is_a: StudyEntity
  Observation:
    description: >-
      The registration of the intent to perform a set of observations as well as the resulting observed values
    is_a: NamedThing
    slots:
      - observation_type
      - observation_design
      - observation_result_id_list
  DerivedObservation:
    description: >-
      An observation in which all observed values are derived from a prior observation through analytical or statistical processing.
    is_a: Observation
    slots:
    - was_derived_from
  ObservationDesign:
    description: >-
      The setup of the observation, listing the study entity type being observed (and -optionally- the entities), as well as the the properties being recorded
    is_a: NamedThing
    slots:
      - observation_result_type
      - observable_entity_type
      - observable_entity_id_list
      - observable_property_specifications
  ObservablePropertySpecification:
    description: >-
      For an observable property being recorded, lists its categorisation and processing rules
    slots:
    - observable_property
    - specification_category
    - calculation_design
    - validation_designs
  ObservationResult:
    description: >-
      The result of an observational effort in Personal Exposure and Health research
    abstract: true
    is_a: NamedThing
    slots:
      - observation_result_type
      - observation_start_date
      - observation_end_date
      - observed_values
  ObservedValue:
    description: >-
      A single observational result value registering a specific property for a specific entity at a specific moment
    slots:
      - observable_entity
      - observable_property
      - raw_value
      - raw_unit
      - imputed_value
      - imputed_unit
      - normalised_value
      - normalised_unit
      - value
      - unit
      - value_as_string
      - quality_data
      - provenance_data
  QualityData:
    description: >-
      Quality metadata, adding context to an Observed Value
    slots:
      - quality_context_key
      - quality_value
  ProvenanceData:
    description: >-
      Provenance metadata, adding context to an Observed Value
    slots:
      - provenance_context_key
      - provenance_value

  DataLayout:
    description: >-
      Layout, allowing the definition of templating sections for combining layout and data elements
    is_a: NamedThing
    slots:
      - sections
  DataLayoutSection:
    description: >-
      Definition for an individual layout or data section, as part of a full layout. Each section contains the information on a single observation.
    is_a: NamedThing
    slots:
      - section_type
      - observable_entity_type
      - elements
      - validation_designs
  DataLayoutElement:
    description: >-
      Definition for an individual layout or data element, as part of a layout section
    slots:
      - label
      - element_type
      - element_style
      - observable_property
      - is_observable_entity_key
      - foreign_key_link
  DataLayoutElementLink:
    description: >-
      Configuration that refers to an element in a layout section
    slots:
      - section
      - label

  DataImportConfig:
    description: >-
      Configuration for incoming data, defining the expected DataLayout and the Observation(s) the data will be added to
    is_a: NamedThing
    slots:
      - layout
      - section_mapping
  DataImportSectionMapping:
    description: >-
      Configuration for mapping structured data from a known layout to one or more study observations
    slots:
      - section_mapping_links
  DataImportSectionMappingLink:
    description: >-
      Configuration that links a data layout section to one or more observations
    slots:
      - section
      - observation_id_list

  DataRequest:
    description: >-
      Registration of a request for data by a data user
    is_a: NamedThing
    slots:
      - contacts
      - request_properties
      - data_stakeholders
      - research_objectives
      - processing_actions
      - processing_steps
      - remark_on_content
      - remark_on_methodology
      - observed_entity_properties
      - observation_design_id_list
  ObservedEntityProperty:
    description: >-
      Conceptual definition of the observation of a certain property for a certain entity in a study
    slots:
      - observable_entity
      - observable_property
  DataStakeholder:
    description: >-
      An organisation participating in a data process in Personal Exposure and Health research
    is_a: NamedThing
    slots:
      - stakeholder
      - data_roles
      - contacts
      - processing_description
  ResearchObjective:
    description: >-
      A research objective communicated in the request and used to evaluate if the request is valid and appropriate
    is_a: NamedThing
    slots:
      - objective_type
      - authors
  ProcessingAction:
    description: >-
      One action in the data request and processing flow
    is_a: NamedThing
  ProcessingStep:
    description: >-
      One step in the data request and processing flow
    is_a: NamedThing
    slots:
      - start_date
      - delivery_date
  DataExtract:
    description: >-
      A set of Observed Values, combined into a data extract
    slots:
      - observed_values

  IAdoptVariable:
    description: >-
      Placeholder class for actual IAdoptVariable
    slots:
      - id
  BioChemRole:
    description: >- 
      A role is particular behaviour which a material entity may exhibit.
    slots:
      - id
    close_mappings: 
      - http://purl.obolibrary.org/obo/chebi_50906

slots:
  id:
    identifier: true
    slot_uri: schema:identifier
    description: >-
      Machine readable, unique identifier; ideally a URI/GUPRI (Globally Unique, Persistent, Resolvable Identifier).
    range: uriorcurie
  short_name:
    slot_uri: schema:alternateName
    description: >-
      Shortened name or code, preferrably unique within the context the entity is (typically) used in.
    exact_mappings:
    - skos:altLabel
  name:
    slot_uri: rdfs:label
    exact_mappings:
    - schema:name
    - skos:prefLabel
    description: >-
      Common human readable name
  description:
    slot_uri: schema:description
    exact_mappings:
    - skos:definition
    description: >-
      Long form description or definition for the entity.
  ui_label:
    slot_uri: pehterms:hasUiLabel
    # restricted to internal use
    description: >-
      Human readable label, to be used in user interactions through forms or documents.
  remark:
    slot_uri: schema:comment
    exact_mappings:
    - skos:note
    description: >-
      Additional comment, note or remark providing context on the use of an entity or the interpretation of its properties.
  was_derived_from:
    slot_uri: prov:wasDerivedFrom
    range: NamedThing
    domain: NamedThing
  suggester:
    slot_uri: prov:wasAttributedTo
    range: uriorcurie
    description: >-
      ORCID of the person who suggested this entity, recorded as the provenance
      attribution (prov:wasAttributedTo) of the resulting nanopublication.
  orcid:
    slot_uri: schema:identifier
  rorid:
    slot_uri: schema:identifier
  label:
    slot_uri: rdfs:label
  alias:
    slot_uri: schema:alternateName
  aliases:
    slot_uri: schema:alternateName
    multivalued: true
    inlined_as_list: true
  context_aliases:
    slot_uri: pehterms:hasContextAlias
    multivalued: true
    inlined_as_list: true
    range: ContextAlias
  exact_matches:
    multivalued: true
    range: uriorcurie
    slot_uri: skos:exactMatch
  context:
    slot_uri: pehterms:hasContext
    range: NamedThing
    inlined: false
  translations:
    slot_uri: pehterms:hasTranslation
    multivalued: true
    inlined_as_list: true
    range: Translation
  property_name:
    slot_uri: schema:identifier
  language:
    slot_uri: schema:inLanguage
  translated_value:
    slot_uri: pehterms:hasTranslatedValue

  validation_history:
    slot_uri: pehterms:hasValidationHistoryRecord
    multivalued: true
    inlined_as_list: true
    range: ValidationHistoryRecord
  quantity_kind:
    slot_uri: qudt:hasQuantityKind
    range: QUDTQuantityKind
    annotations:
      rdf_type: qudt:QuantityKind
  groupings:
    slot_uri: pehterms:hasGrouping
    multivalued: true
    inlined_as_list: true
    range: Grouping
  grouping_id_list:
    multivalued: true
    range: Grouping
    slot_uri: skos:broader
  group_labels:
    multivalued: true
    range: string
    inlined_as_list: true
    slot_uri: pehterms:hasGroupLabel
  parent_grouping_id_list:
    multivalued: true
    range: Grouping
    slot_uri: rdfs:subClassOf

  current_validation_status:
    slot_uri: pehterms:hasCurrentValidationStatus
    range: ValidationStatus
  validation_datetime:
    slot_uri: pehterms:hasValidationDateTime
    range: datetime
  validation_status:
    slot_uri: pehterms:hasValidationStatus
    range: ValidationStatus
  validation_actor:
    slot_uri: pehterms:hasValidationActor
  validation_institute:
    slot_uri: pehterms:hasValidationInstitute
  validation_remark:
    slot_uri: pehterms:hasValidationRemark

  matrix_subclasses:
    slot_uri: pehterms:hasMatrixSubclass
    multivalued: true
    inlined_as_list: true
    range: MatrixSubClass
  biochementity_subclasses:
    slot_uri: pehterms:hasBioChemEntitySubclass
    multivalued: true
    inlined_as_list: true
    range: BioChemEntitySubClass
  indicator_subclasses:
    slot_uri: pehterms:hasIndicatorSubclass
    multivalued: true
    inlined_as_list: true
    range: IndicatorSubClass

  parent_matrices:
    range: MatrixSubClass
    slot_uri: rdfs:subClassOf
    multivalued: true
  indicator_type:
    slot_uri: pehterms:hasIndicatorType
    range: IndicatorType
  parent_indicators:
    range: IndicatorSubClass
    slot_uri: rdfs:subClassOf
    multivalued: true
  parent_biochementities:
    range: BioChemEntitySubClass
    slot_uri: rdfs:subClassOf
    multivalued: true
  property:
    slot_uri: pehterms:hasProperty
  matrix:
    slot_uri: pehterms:hasMatrix
    range: Matrix
  constraints:
    slot_uri: pehterms:hasConstraint
    multivalued: true
  relevant_observable_entity_types:
    slot_uri: pehterms:hasRelevantObservableEntityType
    multivalued: true
    range: ObservableEntityType
  biochementity:
    slot_uri: pehterms:hasBioChemEntity
    range: BioChemEntity
    inlined: false

  molweight_grampermol:
    slot_uri: pehterms:hasMolecularWeight
    range: decimal
    description: The molecular weight of the chemical entity in g/mol
    unit:
      ucum_code: "g/mol"
  is_metabolite_of:
    description: Indicates that this molecular entity is a metabolite of another molecular entity
    range: BioChemEntity
    multivalued: true
    slot_uri: pehterms:isMetaboliteOf
  is_isomer_of:
    description: Indicates that this molecular entity is an isomer of another molecular entity
    range: BioChemEntity
    multivalued: true
    slot_uri: pehterms:isIsomerOf
  has_role:
    multivalued: true
    slot_uri: http://purl.obolibrary.org/obo/RO_0000087
    range: BioChemRole
    domain: BioChemEntity

  categorical:
    slot_uri: pehterms:isCategorical
    range: boolean
  multivalued:
    slot_uri: pehterms:isMultivalued
    range: boolean
  value_type:
    slot_uri: pehterms:hasValueType
  value_metadata:
    slot_uri: pehterms:hasValueMetadata
    multivalued: true
    inlined_as_list: true
    range: ObservablePropertyMetadataElement
  value_options:
    slot_uri: pehterms:hasValueOption
    multivalued: true
    inlined_as_list: true
    range: ObservablePropertyValueOption
  required:
    slot_uri: pehterms:isRequired
    range: boolean
  zeroallowed:
    slot_uri: pehterms:isZeroAllowed
    range: boolean
  min_value:
    slot_uri: pehterms:hasMinimumValue
    description: String representation of the expected lower bound in observations, usable for data validation
  max_value:
    slot_uri: pehterms:hasMaximumValue
    description: String representation of the expected upper bound in observations, usable for data validation
  significantdecimals:
